# data-fire 后端测试配置
# asyncio_mode=auto：让 async def test_* 自动作为 asyncio 用例，无需逐个标 @pytest.mark.asyncio
# asyncio_default_fixture_loop_scope=function：显式声明异步 fixture 的 event loop 作用域为函数级，
#   消除 pytest-asyncio 的未设置警告（未来版本会默认 function，这里提前对齐）
# testpaths=test：只在 server/test 目录里找测试，不误跑 .venv 里的第三方测试
[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = test
python_files = test_*.py
python_classes = Test*
python_functions = test_*
